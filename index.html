<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Framework - Content Metrics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #results {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: none;
        }

        #results.active {
            display: block;
        }

        #results h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .metric-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .metric-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .metric-value {
            color: #667eea;
            font-size: 1.3em;
            font-weight: bold;
        }

        .recommendations {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .recommendations h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .recommendations ul {
            margin-left: 20px;
            color: #333;
        }

        .recommendations li {
            margin-bottom: 8px;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 8px;
            color: #c62828;
            display: none;
        }

        .error.active {
            display: block;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 GEO Framework</h1>
            <p>Content Metrics & Quality Evaluation</p>
        </div>

        <div class="content">
            <div class="panel">
                <h2>Input Method 1: URL</h2>
                <div class="form-group">
                    <label for="url">Enter URL:</label>
                    <input type="text" id="url" placeholder="https://example.com" />
                </div>
                <button id="analyzeUrlButton">Analyze URL</button>
            </div>

            <div class="panel">
                <h2>Input Method 2: Direct Content</h2>
                <div class="form-group">
                    <label for="content">Paste HTML Content:</label>
                    <textarea id="content" placeholder="Paste your HTML content here..."></textarea>
                </div>
                <button id="analyzeContentButton">Analyze Content</button>
            </div>
        </div>

        <div class="error" id="error"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing content...</p>
        </div>

        <div id="results">
            <h2>📊 Results</h2>
            <div id="metricsContainer"></div>
        </div>
    </div>

    <script>
      const apiUrl = "https://k5ylj22gv3emlwsxzb2spjxwwy0iluwb.lambda-url.eu-central-1.on.aws/";

      async function callApi({ content, url }) {
        const errorEl = document.getElementById("error");
        const loadingEl = document.getElementById("loading");
        const resultsEl = document.getElementById("results");
        const metricsContainer = document.getElementById("metricsContainer");

        errorEl.classList.remove("active");
        errorEl.textContent = "";
        resultsEl.classList.remove("active");
        metricsContainer.innerHTML = "";

        if (!content && !url) {
          errorEl.textContent = "Please enter content or a URL.";
          errorEl.classList.add("active");
          return;
        }

        const params = new URLSearchParams();
        if (content) params.append("content", content);
        if (url) params.append("url", url);

        try {
          loadingEl.classList.add("active");

          const response = await fetch(apiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
            },
            body: params.toString()
          });

          let data;
          try {
            data = await response.json();
          } catch (e) {
            console.error("Failed to parse JSON:", e);
            errorEl.textContent = "Failed to parse server response.";
            errorEl.classList.add("active");
            return;
          }

          if (!response.ok) {
            console.error("Server error response:", data);
            errorEl.textContent = data.error || "Server error occurred.";
            errorEl.classList.add("active");
            return;
          }

          renderResults(data);
        } catch (err) {
          console.error("Fetch error:", err);
          errorEl.textContent = "Load failed: " + err.message;
          errorEl.classList.add("active");
        } finally {
          loadingEl.classList.remove("active");
        }
      }

      function renderResults(data) {
        const resultsEl = document.getElementById("results");
        const metricsContainer = document.getElementById("metricsContainer");
        resultsEl.classList.add("active");
        metricsContainer.innerHTML = "";

        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(data, null, 2);
        metricsContainer.appendChild(pre);
      }

      function analyzeURL() {
        const urlVal = document.getElementById("url").value.trim();
        callApi({ content: "", url: urlVal });
      }

      function analyzeContent() {
        const contentVal = document.getElementById("content").value.trim();
        callApi({ content: contentVal, url: "" });
      }

      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("analyzeUrlButton")
          .addEventListener("click", (e) => {
            e.preventDefault();
            analyzeURL();
          });

        document
          .getElementById("analyzeContentButton")
          .addEventListener("click", (e) => {
            e.preventDefault();
            analyzeContent();
          });
      });
    </script>
</body>
</html>
