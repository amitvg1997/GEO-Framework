<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Framework - Content Metrics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #results {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: none;
        }

        #results.active {
            display: block;
        }

        #results h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .metric-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .metric-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .metric-value {
            color: #667eea;
            font-size: 1.3em;
            font-weight: bold;
        }

        .recommendations {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .recommendations h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .recommendations ul {
            margin-left: 20px;
            color: #333;
        }

        .recommendations li {
            margin-bottom: 8px;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 8px;
            color: #c62828;
            display: none;
        }

        .error.active {
            display: block;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 GEO Framework</h1>
            <p>Content Metrics & Quality Evaluation</p>
        </div>

        <div class="content">
            <div class="panel">
                <h2>Input Method 1: URL</h2>
                <div class="form-group">
                    <label for="url">Enter URL:</label>
                    <input type="text" id="url" placeholder="https://example.com" />
                </div>
                <button onclick="analyzeURL()">Analyze URL</button>
            </div>

            <div class="panel">
                <h2>Input Method 2: Direct Content</h2>
                <div class="form-group">
                    <label for="content">Paste HTML Content:</label>
                    <textarea id="content" placeholder="Paste your HTML content here..."></textarea>
                </div>
                <button onclick="analyzeContent()">Analyze Content</button>
            </div>
        </div>

        <div class="error" id="error"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing content...</p>
        </div>

        <div id="results">
            <h2>📊 Results</h2>
            <div id="metricsContainer"></div>
        </div>
    </div>

    <script>
        // Replace with your actual Lambda function URL or API Gateway endpoint
        const LAMBDA_FUNCTION_URL = "https://YOUR_API_GATEWAY_URL";

        async function analyzeURL() {
            const url = document.getElementById("url").value.trim();
            if (!url) {
                showError("Please enter a URL");
                return;
            }

            await analyze({ url, content: null });
        }

        async function analyzeContent() {
            const content = document.getElementById("content").value.trim();
            if (!content) {
                showError("Please paste HTML content");
                return;
            }

            await analyze({ url: null, content });
        }

        async function analyze(payload) {
            showLoading(true);
            hideError();

            try {
                // For direct Lambda invocation (if using Lambda URL)
                const response = await fetch(LAMBDA_FUNCTION_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                showError(`Error: ${error.message}`);
                console.error("Full error:", error);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(data) {
            const container = document.getElementById("metricsContainer");
            container.innerHTML = "";

            // Parse response if it's a string
            let results = data;
            if (typeof data === "string") {
                results = JSON.parse(data);
            }

            // If Lambda returns {body: "..."}, parse the body
            if (results.body && typeof results.body === "string") {
                results = JSON.parse(results.body);
            }

            // Display metrics
            const metrics = [
                { key: "flesch_kincaid", label: "Flesch-Kincaid Grade" },
                { key: "word_count", label: "Word Count" },
                { key: "avg_sentence_length", label: "Avg Sentence Length" },
                { key: "h1_count", label: "H1 Headers" },
                { key: "h2_count", label: "H2 Headers" },
                { key: "h3_count", label: "H3 Headers" },
                { key: "headers_to_text_ratio", label: "Headers to Text Ratio" },
                { key: "paragraph_length_variance", label: "Paragraph Variance" },
                { key: "faq_density", label: "FAQ Density" },
                { key: "citation_count", label: "External Citations" },
                { key: "author_present", label: "Author Mentioned" },
                { key: "date_present", label: "Date Mentioned" },
                { key: "unique_entity_count", label: "Unique Entities" },
                { key: "schema_score", label: "Schema.org Score" },
                { key: "topic_coverage_score", label: "Topic Coverage" },
            ];

            metrics.forEach(({ key, label }) => {
                if (key in results) {
                    const value = results[key];
                    const displayValue = typeof value === "boolean" ? (value ? "✓ Yes" : "✗ No") : value.toFixed ? value.toFixed(2) : value;
                    container.innerHTML += `
                        <div class="metric-card">
                            <h3>${label}</h3>
                            <div class="metric-value">${displayValue}</div>
                        </div>
                    `;
                }
            });

            // Display recommendations
            if (results.recommendations && results.recommendations.length > 0) {
                container.innerHTML += `
                    <div class="recommendations">
                        <h3>💡 Recommendations</h3>
                        <ul>
                            ${results.recommendations.map(rec => `<li>${rec}</li>`).join("")}
                        </ul>
                    </div>
                `;
            }

            document.getElementById("results").classList.add("active");
        }

        function showLoading(show) {
            const loading = document.getElementById("loading");
            if (show) {
                loading.classList.add("active");
            } else {
                loading.classList.remove("active");
            }
        }

        function showError(message) {
            const error = document.getElementById("error");
            error.textContent = message;
            error.classList.add("active");
        }

        function hideError() {
            const error = document.getElementById("error");
            error.classList.remove("active");
        }
    </script>
</body>
</html>
