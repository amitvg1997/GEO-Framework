name: Deploy GEO Framework Lambda (Container)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "498747778884"
  ECR_REPOSITORY: "geo-framework-api"
  IMAGE_TAG: "${{ github.sha }}"
  LAMBDA_FUNCTION_NAME: "geo-framework-api-image"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::498747778884:role/GeoFrameworkGitHubOIDCRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG \
            .

      - name: Push Docker image to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Lambda to use new image
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_NAME \
            --image-uri $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG \
            --region $AWS_REGION

      - name: Wait for Lambda update
        run: sleep 10

      - name: Verify deployment
        run: |
          aws lambda get-function-configuration \
            --function-name $LAMBDA_FUNCTION_NAME \
            --region $AWS_REGION

          aws lambda invoke \
            --function-name $LAMBDA_FUNCTION_NAME \
            --payload '{"test": true}' \
            /tmp/response.json \
            --region $AWS_REGION

          cat /tmp/response.json
