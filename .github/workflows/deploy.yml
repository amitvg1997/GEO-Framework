permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::498747778884:role/GeoFrameworkGitHubOIDCRole
          aws-region: eu-central-1

      - name: Deploy Lambda
        run: |
          pip install -r requirements.txt -t package
          cp app.py package/
          cp -r metrics package/
          cd package
          zip -r ../geo-framework.zip .
          aws lambda update-function-code \
              --function-name geo-framework-api \
              --zip-file fileb://geo-framework.zip